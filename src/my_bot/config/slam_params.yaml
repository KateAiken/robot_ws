slam_toolbox:
  ros__parameters:
    use_sim_time: false
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    world_frame: map
    scan_topic: /scan
    mode: mapping
    scan_queue_size: 10
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 2.0
    resolution: 0.05
    minimum_travel_distance: 0.001  # very small - update on tiny movements
    minimum_travel_heading: 0.001
    use_lifecycle_manager: false
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_time_interval: 0.5
    stack_size_to_use: 40000000
    # scan matching settings - higher = trust lidar more
    laser_max_range: 12.0
    laser_min_range: 0.15
    minimum_laser_range: 0.15
    ceres_loss_function: None
    ceres_gradient_tolerance: 1e-10
    ceres_function_tolerance: 1e-10