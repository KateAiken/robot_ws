slam_toolbox:
  ros__parameters:
    use_sim_time: false
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    world_frame: map
    scan_topic: /scan
    mode: mapping
    scan_queue_size: 10
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 2.0
    resolution: 0.05
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    use_lifecycle_manager: false
    use_scan_matching: true
    use_scan_barycenter: true